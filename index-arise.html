<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Arise — من الصفر إلى أرامكو</title>
<meta name="theme-color" content="#0F5147" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Arise" />
<style>
html,body{margin:0;background:#0F5147}
#splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0F5147;color:#fff;font-family:Tahoma,system-ui;z-index:99;transition:opacity .4s}
#splash svg{width:92px;height:92px}
#splash div{margin-top:14px;font-weight:800;letter-spacing:8px;font-size:22px}
@keyframes rise{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
#splash *{animation:rise .6s ease}
</style>
</head>
<body>
<div id="splash">
<svg viewBox="0 0 100 100" fill="#FFFFFF"><path d="M12 86 L44 16 L64 54 L55 54 L44 33 L27 86 Z"/><path d="M58 86 L70 86 L89 42 L79 40 Z"/><path d="M18 80 L70 32 L76 39 L25 86 Z"/><path d="M66 14 L93 21 L83 45 Z"/></svg>
<div>ARISE</div>
</div>
<div id="root"></div>
<script src="./app.js"></script>
<script>
addEventListener("load",()=>{const s=document.getElementById("splash");setTimeout(()=>{s.style.opacity=0;setTimeout(()=>s.remove(),450)},250)});
</script>
</body>
</html>
